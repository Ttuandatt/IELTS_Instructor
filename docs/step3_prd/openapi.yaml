openapi: 3.0.3
info:
  title: IELTS Helper API (MVP)
  version: 0.1.0
servers:
  - url: http://localhost:3001
paths:
  /auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201': {description: Created}
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': {description: OK}
        '401': {description: Invalid credentials}
  /auth/refresh:
    post:
      summary: Refresh tokens
      responses:
        '200': {description: OK}
        '401': {description: Invalid/expired refresh}
  /me:
    get:
      summary: Get profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401': {description: Unauthorized}
  /reading/passages:
    get:
      summary: List passages
      parameters:
        - in: query
          name: level
          schema: {type: string}
        - in: query
          name: topic
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PassageSummary'
  /reading/passages/{id}:
    get:
      summary: Get passage
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassageDetail'
  /reading/passages/{id}/submit:
    post:
      summary: Submit reading answers
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadingSubmitRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingSubmitResponse'
        '400': {description: Needs >=80% answers}
        '401': {description: Unauthorized}
  /writing/prompts:
    get:
      summary: List prompts
      parameters:
        - in: query
          name: level
          schema: {type: string}
        - in: query
          name: task_type
          schema: {type: string, enum: ['1','2']}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptSummary'
  /writing/prompts/{id}/submit:
    post:
      summary: Submit essay (async capable)
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WritingSubmitRequest'
      responses:
        '200':
          description: Accepted/Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritingSubmissionResponse'
        '429': {description: Rate limited}
        '401': {description: Unauthorized}
  /writing/submissions/{id}:
    get:
      summary: Get writing submission result
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritingSubmissionResponse'
        '401': {description: Unauthorized}
  /admin/sources/import:
    post:
      summary: Import NotebookLM source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportSourceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSourceResponse'
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/content/{entity}/{id}/publish:
    post:
      summary: Publish entity
      parameters:
        - in: path
          name: entity
          required: true
          schema: {type: string}
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/passages:
    post:
      summary: Create passage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassageUpsert'
      responses:
        '201': {description: Created}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    get:
      summary: List passages (admin)
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/passages/{id}:
    put:
      summary: Update passage
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassageUpsert'
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    delete:
      summary: Delete passage
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Deleted}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/questions:
    post:
      summary: Create question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionUpsert'
      responses:
        '201': {description: Created}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    get:
      summary: List questions (admin)
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/questions/{id}:
    put:
      summary: Update question
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionUpsert'
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    delete:
      summary: Delete question
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Deleted}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/prompts:
    post:
      summary: Create prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptUpsert'
      responses:
        '201': {description: Created}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    get:
      summary: List prompts (admin)
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
  /admin/prompts/{id}:
    put:
      summary: Update prompt
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptUpsert'
      responses:
        '200': {description: OK}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
    delete:
      summary: Delete prompt
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Deleted}
        '401': {description: Unauthorized}
        '403': {description: Forbidden}
components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email: {type: string, format: email}
        password: {type: string}
        role: {type: string, enum: [learner, instructor, admin]}
        language: {type: string, enum: [vi, en], default: vi}
        theme: {type: string, enum: [dark, light], default: light}
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string}
    Profile:
      type: object
      properties:
        id: {type: string, format: uuid}
        email: {type: string}
        role: {type: string}
        language: {type: string}
        theme: {type: string}
    PassageSummary:
      type: object
      properties:
        id: {type: string, format: uuid}
        title: {type: string}
        level: {type: string}
        topic_tags:
          type: array
          items: {type: string}
    PassageDetail:
      allOf:
        - $ref: '#/components/schemas/PassageSummary'
        - type: object
          properties:
            body: {type: string}
            questions:
              type: array
              items:
                $ref: '#/components/schemas/Question'
    Question:
      type: object
      properties:
        id: {type: string, format: uuid}
        type: {type: string, enum: [mcq, short]}
        prompt: {type: string}
        options:
          type: array
          items: {type: string}
        answer_key: {}
        explanation: {type: string}
    QuestionUpsert:
      type: object
      required: [passage_id, type, prompt]
      properties:
        passage_id: {type: string, format: uuid}
        type: {type: string, enum: [mcq, short]}
        prompt: {type: string}
        options:
          type: array
          items: {type: string}
        answer_key: {}
        explanation: {type: string}
    PassageUpsert:
      type: object
      required: [title, body]
      properties:
        title: {type: string}
        body: {type: string}
        level: {type: string}
        topic_tags:
          type: array
          items: {type: string}
        source_ids:
          type: array
          items: {type: string, format: uuid}
    PromptSummary:
      type: object
      properties:
        id: {type: string, format: uuid}
        task_type: {type: string, enum: ['1','2']}
        title: {type: string}
        level: {type: string}
        topic_tags:
          type: array
          items: {type: string}
    PromptUpsert:
      type: object
      required: [title, prompt_text, task_type]
      properties:
        title: {type: string}
        prompt_text: {type: string}
        task_type: {type: string, enum: ['1','2']}
        level: {type: string}
        topic_tags:
          type: array
          items: {type: string}
        source_ids:
          type: array
          items: {type: string, format: uuid}
    ReadingSubmitRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            required: [question_id, value]
            properties:
              question_id: {type: string, format: uuid}
              value: {}
    ReadingSubmitResponse:
      type: object
      properties:
        score_pct: {type: number}
        details:
          type: array
          items:
            type: object
            properties:
              question_id: {type: string, format: uuid}
              correct: {type: boolean}
              explanation: {type: string}
    WritingSubmitRequest:
      type: object
      required: [content]
      properties:
        content: {type: string}
        model_tier: {type: string, enum: [cheap, premium], default: cheap}
    Score:
      type: object
      properties:
        TR: {type: number}
        CC: {type: number}
        LR: {type: number}
        GRA: {type: number}
        overall: {type: number}
    Feedback:
      type: object
      properties:
        summary: {type: string}
        strengths:
          type: array
          items: {type: string}
        improvements:
          type: array
          items: {type: string}
    WritingSubmissionResponse:
      type: object
      properties:
        processing_status: {type: string, enum: [pending, done, failed]}
        submission_id: {type: string, format: uuid}
        scores: {$ref: '#/components/schemas/Score'}
        feedback: {$ref: '#/components/schemas/Feedback'}
        turnaround_ms: {type: integer}
        error: {type: string}
    ImportSourceRequest:
      type: object
      required: [url]
      properties:
        url: {type: string}
        metadata: {type: object}
    ImportSourceResponse:
      type: object
      properties:
        source_id: {type: string, format: uuid}
        snippets:
          type: array
          items:
            type: object
            properties:
              id: {type: string, format: uuid}
              text: {type: string}
              tags:
                type: array
                items: {type: string}
              level: {type: string}
              linked_entity: {type: string, format: uuid}
              linked_type: {type: string}
